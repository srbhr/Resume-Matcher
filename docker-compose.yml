services:
  resume-matcher:
    build:
      context: .
      dockerfile: Dockerfile
      # NEXT_PUBLIC_API_URL is the backend URL used by the Next.js server-side
      # proxy rewrite. It must be reachable from *inside* the container, so
      # localhost:8000 is always correct here regardless of remote access.
      # Browser requests are proxied through Next.js - they never contact the
      # backend directly, so no CORS or IP configuration is needed for remote use.
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:${BACKEND_PORT:-8000}
    image: resume-matcher
    container_name: resume-matcher
    # Port mapping: HOST_PORT:CONTAINER_PORT
    # Customize host ports via environment variables (container ports are fixed)
    ports:
      - "${FRONTEND_PORT:-3000}:3000"   # Frontend (Next.js)
      - "${BACKEND_PORT:-8000}:8000"    # Backend API (FastAPI)
    volumes:
      - resume-data:/app/backend/data
    environment:
      - NODE_ENV=production
      # Pass port configuration to container for internal use
      - FRONTEND_PORT=${FRONTEND_PORT:-3000}
      - BACKEND_PORT=${BACKEND_PORT:-8000}
      # LLM Configuration - configure via Settings UI or set env vars for explicit overrides
      # Supported providers: openai, anthropic, openrouter, gemini, deepseek, ollama
      # Defaults are defined in apps/backend/app/config.py
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - LLM_MODEL=${LLM_MODEL:-}
      - LLM_API_KEY=${LLM_API_KEY:-}
      # For Ollama running on host machine, use host.docker.internal:
      # - LLM_API_BASE=http://host.docker.internal:11434
      - LLM_API_BASE=${LLM_API_BASE:-}
      # CORS Configuration
      # For remote server access, set CORS_ORIGINS to include your server's IP/hostname.
      # Example: CORS_ORIGINS=["http://192.168.1.100:3000","http://localhost:3000"]
      - CORS_ORIGINS=${CORS_ORIGINS:-["http://localhost:3000","http://127.0.0.1:3000"]}
      # Frontend base URL used by Playwright (inside the container) for PDF generation.
      # Keep this as localhost - Playwright runs inside the container where frontend is on port 3000.
      # Only change if you have a custom single-container setup.
      - FRONTEND_BASE_URL=${FRONTEND_BASE_URL:-http://localhost:3000}
    restart: unless-stopped
    healthcheck:
      # Health check uses internal container port (always 8000)
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  resume-data:
    driver: local
